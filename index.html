<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Job Post Generator PRO</title>

<style>
body { font-family: Arial; background:#f5f5f5; padding:20px }
.container { max-width:900px; margin:auto; background:#fff; padding:20px; border-radius:10px }
input, textarea { width:100%; padding:10px; margin:8px 0 }
button { padding:12px 20px; background:#0073aa; color:#fff; border:none; cursor:pointer }
.output { margin-top:20px }
.preview { border:1px solid #ddd; padding:15px; margin-top:10px }
</style>
</head>

<body>
<div class="container">
<h2>AI Job Post Generator (Final Pro Version)</h2>

<input id="company" placeholder="Company Name (Required)">
<input id="position" placeholder="Job Position (Required)">
<input id="location" placeholder="Location (City, State)">
<input id="experience" placeholder="Experience">
<input id="salary" placeholder="Salary Range">
<input id="link" placeholder="Apply Link">
<textarea id="desc" placeholder="Short Job Description"></textarea>

<button onclick="generatePost()">Generate Job Post</button>

<div class="output" id="output"></div>
</div>

<script>

function cleanText(text){
  return text.replace(/[^a-zA-Z0-9 ]/g, " ").replace(/\s+/g, " ").trim();
}

function slugify(text){
  return text.toLowerCase()
    .replace(/[^a-z0-9 ]/g, "")
    .replace(/\s+/g, "-")
    .replace(/-+/g, "-")
    .replace(/^-|-$/g, "")
    .substring(0,70);
}

function generatePost(){

let company = document.getElementById('company').value.trim();
let position = document.getElementById('position').value.trim();
let location = document.getElementById('location').value.trim();
let exp = document.getElementById('experience').value.trim();
let salary = document.getElementById('salary').value.trim();
let link = document.getElementById('link').value.trim();
let desc = document.getElementById('desc').value.trim();

// VALIDATION
if(!company || !position || !location){
  alert("Please fill Company, Position and Location");
  return;
}

// CLEAN DATA
let cleanCompany = cleanText(company);
let cleanLocation = cleanText(location);

let keyword = `${position} Job in ${cleanLocation}`;

// SEO TITLE
let title = `🔥 5 Openings: ${position} at ${cleanCompany} in ${cleanLocation} Apply Now`;

// URL
let permalink = slugify(`${position} job ${cleanLocation} ${cleanCompany}`);

// META
let metaDesc = `Apply for ${position} at ${cleanCompany} in ${cleanLocation}. Salary ${salary}. Experience ${exp}. Apply now.`;

// LONG CONTENT
let longContent = "";
for(let i=0;i<10;i++){
  longContent += `<p>The ${keyword} at ${cleanCompany} offers excellent career growth. Candidates with ${exp} experience can apply. This ${keyword} offers salary ${salary} and long-term stability.</p>`;
}

let content = `
<h1>${title}</h1>

<h2>Table of Contents</h2>
<ul>
<li>Overview</li>
<li>Description</li>
<li>Responsibilities</li>
<li>Eligibility</li>
<li>Salary</li>
<li>Apply</li>
</ul>

<h2>${keyword}</h2>
<p><b>Company:</b> ${cleanCompany}</p>
<p><b>Location:</b> ${cleanLocation}</p>
<p><b>Experience:</b> ${exp}</p>
<p><b>Salary:</b> ${salary}</p>

<h3>Job Overview</h3>
<p>This ${keyword} is a great opportunity for candidates looking for growth in ${cleanCompany}.</p>

<h3>Job Description</h3>
<p>${desc}</p>

${longContent}

<h3>Responsibilities</h3>
<ul>
<li>Handle ${position} tasks</li>
<li>Work with team</li>
<li>Maintain quality</li>
</ul>

<h3>Eligibility</h3>
<ul>
<li>${exp} required</li>
<li>Relevant skills</li>
</ul>

<h3>Salary</h3>
<p>${salary}</p>

<h3>Apply</h3>
<p><a href="${link}" target="_blank" rel="dofollow">Apply Now</a></p>

<h3>More Jobs</h3>
<p><a href="https://gethyrd.in" target="_blank" rel="dofollow">Check More Jobs</a></p>

<img src="https://via.placeholder.com/800" alt="${keyword}">

<p>This ${keyword} is trending. Apply now.</p>
`;

// OUTPUT UI
let finalOutput = `
<h3>SEO Title</h3>
<p>${title}</p>

<h3>Permalink</h3>
<p>${permalink}</p>

<h3>Meta Description</h3>
<p>${metaDesc}</p>

<h3>Focus Keyword</h3>
<p>${keyword}</p>

<h3>Copy HTML</h3>
<textarea style="width:100%;height:250px">${content}</textarea>
<button onclick="copyContent()">Copy</button>

<h3>Preview</h3>
<div class="preview">${content}</div>
`;

document.getElementById('output').innerHTML = finalOutput;
}

function copyContent(){
let text = document.querySelector('textarea');
text.select();
document.execCommand('copy');
alert('Copied');
}

</script>
</body>
</html>
