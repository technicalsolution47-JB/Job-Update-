<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Job Post Generator</title>
<style>
body { font-family: Arial; padding: 20px; background:#f5f5f5 }
.container { max-width:900px; margin:auto; background:#fff; padding:20px; border-radius:10px }
input, textarea { width:100%; margin:10px 0; padding:10px }
button { padding:12px 20px; background:#0073aa; color:#fff; border:none; cursor:pointer }
.output { margin-top:20px; background:#fafafa; padding:15px; border-radius:8px }
</style>
</head>
<body>
<div class="container">
<h2>AI Job Post Generator Tool</h2>

<input id="company" placeholder="Company Name">
<input id="position" placeholder="Job Position">
<input id="location" placeholder="Location">
<input id="experience" placeholder="Experience (e.g. 2-5 years)">
<input id="salary" placeholder="Salary Range">
<input id="link" placeholder="Apply Link">
<textarea id="desc" placeholder="Short Job Description"></textarea>

<button onclick="generatePost()">Generate Job Post</button>

<div class="output" id="output"></div>
</div>

<script>
function generatePost() {
let company = document.getElementById('company').value;
let position = document.getElementById('position').value;
let location = document.getElementById('location').value;
let exp = document.getElementById('experience').value;
let salary = document.getElementById('salary').value;
let link = document.getElementById('link').value;
let desc = document.getElementById('desc').value;

let keyword = position + " Job in " + location;

let title = "🔥 Urgent Hiring: " + position + " at " + company + " | Apply Now " + location;

let permalink = (position + " job " + location + " " + company).toLowerCase().replace(/\s+/g,'-');

let metaDesc = "Apply for " + position + " at " + company + " in " + location + ". Salary " + salary + ". " + exp + " required. Apply now.";

let content = `
<h1>${title}</h1>

<h2>${position} Job in ${location}</h2>

<p><b>Company:</b> ${company}</p>
<p><b>Location:</b> ${location}</p>
<p><b>Experience:</b> ${exp}</p>
<p><b>Salary:</b> ${salary}</p>

<h3>Job Description</h3>
<p>${desc}</p>

<h3>Key Responsibilities</h3>
<ul>
<li>Handle daily operations related to ${position}</li>
<li>Work with team and meet deadlines</li>
<li>Maintain quality standards</li>
</ul>

<h3>Eligibility Criteria</h3>
<ul>
<li>${exp} experience required</li>
<li>Relevant skills in ${position}</li>
</ul>

<h3>How to Apply</h3>
<p>Apply here: <a href="${link}" target="_blank" rel="dofollow">Apply Now</a></p>

<h3>Why Join ${company}?</h3>
<p>Great growth opportunity, competitive salary, and learning environment.</p>

<h3>Important Links</h3>
<p><a href="https://www.naukri.com" target="_blank" rel="dofollow">Explore More Jobs</a></p>

<img src="https://via.placeholder.com/800" alt="${keyword}">

<p>This ${keyword} is one of the best opportunities for candidates looking for ${position} jobs in ${location}. Don't miss this chance.</p>

`;

let finalOutput = `
<b>SEO Title:</b><br>${title}<br><br>
<b>Permalink:</b><br>${permalink}<br><br>
<b>Meta Description:</b><br>${metaDesc}<br><br>
<b>Focus Keyword:</b><br>${keyword}<br><br>
<b>Full Job Post:</b><br>${content}
`;

document.getElementById('output').innerHTML = finalOutput;
}
</script>
</body>
</html>
