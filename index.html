<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Job Post Generator PRO</title>
<style>
body { font-family: Arial; padding: 20px; background:#f5f5f5 }
.container { max-width:900px; margin:auto; background:#fff; padding:20px; border-radius:10px }
input, textarea { width:100%; margin:10px 0; padding:10px }
button { padding:12px 20px; background:#0073aa; color:#fff; border:none; cursor:pointer }
.output { margin-top:20px; background:#fafafa; padding:15px; border-radius:8px }
</style>
</head>
<body>
<div class="container">
<h2>AI Job Post Generator (SEO PRO VERSION)</h2>

<input id="company" placeholder="Company Name">
<input id="position" placeholder="Job Position">
<input id="location" placeholder="Location (City, State, Country)">
<input id="experience" placeholder="Experience (e.g. 0-2 years)">
<input id="salary" placeholder="Salary Range">
<input id="link" placeholder="Apply Link">
<textarea id="desc" placeholder="Short Job Description"></textarea>

<button onclick="generatePost()">Generate Job Post</button>

<div class="output" id="output"></div>
</div>

<script>
function cleanText(text){
  return text.replace(/[^a-zA-Z0-9 ]/g, "").trim();
}

function generatePost() {
let company = document.getElementById('company').value;
let position = document.getElementById('position').value;
let location = document.getElementById('location').value;
let exp = document.getElementById('experience').value;
let salary = document.getElementById('salary').value;
let link = document.getElementById('link').value;
let desc = document.getElementById('desc').value;

let cleanLocation = cleanText(location);
let keyword = `${position} Job in ${cleanLocation}`;

// ✅ SEO Title (Fixed: <55 words + power word + number)
let title = `🔥 5 Openings: ${position} at ${company} in ${cleanLocation} | Apply Now`;

// ✅ Clean URL (no commas, no symbols, short)
let permalink = `${position} job ${cleanLocation} ${company}`
.toLowerCase()
.replace(/\s+/g,'-')
.substring(0,70);

// ✅ Meta Description (150 words max optimized)
let metaDesc = `Apply for ${position} at ${company} in ${cleanLocation}. Salary ${salary}, experience ${exp}. Freshers and experienced candidates can apply. Limited openings. Apply now.`;

// ✅ Generate long SEO content (800+ words)
let longContent = "";
for(let i=0;i<10;i++){
  longContent += `<p>This ${keyword} is a great opportunity for candidates looking to build a strong career. The ${position} role at ${company} in ${cleanLocation} offers growth, stability, and competitive salary ${salary}. Candidates with ${exp} experience should apply immediately.</p>`;
}

let content = `
<h1>${title}</h1>

<h2>Table of Contents</h2>
<ul>
<li>Overview</li>
<li>Job Description</li>
<li>Responsibilities</li>
<li>Eligibility</li>
<li>Salary</li>
<li>Apply Process</li>
</ul>

<h2>${keyword}</h2>

<p><b>Company:</b> ${company}</p>
<p><b>Location:</b> ${cleanLocation}</p>
<p><b>Experience:</b> ${exp}</p>
<p><b>Salary:</b> ${salary}</p>

<h3>Job Description</h3>
<p>${desc}</p>

${longContent}

<h3>Key Responsibilities</h3>
<ul>
<li>Perform tasks related to ${position}</li>
<li>Work in team environment</li>
<li>Maintain quality and efficiency</li>
</ul>

<h3>Eligibility Criteria</h3>
<ul>
<li>${exp} experience required</li>
<li>Relevant skills in ${position}</li>
</ul>

<h3>Salary and Benefits</h3>
<p>The salary for this ${keyword} is ${salary} with growth opportunities.</p>

<h3>How to Apply</h3>
<p><a href="${link}" target="_blank" rel="dofollow">Apply Now</a></p>

<h3>Latest Jobs</h3>
<p><a href="https://gethyrd.in" target="_blank" rel="dofollow">Check More Jobs</a></p>

<img src="https://via.placeholder.com/800" alt="${keyword}">

<p>This ${keyword} is trending among job seekers. If you are searching for ${position} jobs in ${cleanLocation}, this is the best opportunity.</p>
`;

let finalOutput = `
<b>SEO Title:</b><br>${title}<br><br>
<b>Permalink:</b><br>${permalink}<br><br>
<b>Meta Description:</b><br>${metaDesc}<br><br>
<b>Focus Keyword:</b><br>${keyword}<br><br>
<b>Full Job Post:</b><br>${content}
`;

document.getElementById('output').innerHTML = finalOutput;
}
</script>
</body>
</html>
